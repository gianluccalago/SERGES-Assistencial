services:
  - type: web
    name: serges-obrigacoes
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # Reescreve qualquer rota para o index.html (SPA), evitando 404 ao recarregar.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: "22"
